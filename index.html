// Cell assignment — each bird snaps to nearest unoccupied 5° cell center
// Cell centers sit at ...-12.5,-7.5,-2.5,2.5,7.5... (offset by CELL/2)
const _usedCells=new Set();
function assignCell(la,lo){
  const snap=v=>Math.round((v-CELL/2)/CELL)*CELL+CELL/2;
  for(let r=0;r<=36;r++){
    const offsets=[];
    for(let i=-r;i<=r;i++)for(let j=-r;j<=r;j++)if(Math.abs(i)===r||Math.abs(j)===r)offsets.push([i,j]);
    offsets.sort((a,b)=>a[0]*a[0]+a[1]*a[1]-b[0]*b[0]-b[1]*b[1]);
    for(const[di,dj]of offsets){
      const cLa=snap(la)+di*CELL,cLo=snap(lo)+dj*CELL;
      if(Math.abs(cLa)>87)continue;
      const nLo=((cLo%360)+360)%360>180?((cLo%360)+360)%360-360:((cLo%360)+360)%360;
      const key=`${cLa},${nLo}`;
      if(!_usedCells.has(key)){_usedCells.add(key);return{la:cLa,lo:nLo};}
    }
  }
  return{la,lo};
}

const arcG=new THREE.Group();
ROUTES.forEach(r=>{const f=ll2v(r.f.la,r.f.lo,R+.02),t=ll2v(r.t.la,r.t.lo,R+.02);const mid=f.clone().add(t).multiplyScalar(.5);mid.normalize().multiplyScalar(R+f.distanceTo(t)*.15);const curve=new THREE.QuadraticBezierCurve3(f,mid,t);const pts=curve.getPoints(80);arcG.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),new THREE.LineBasicMaterial({color:new THREE.Color(r.c),transparent:true,opacity:.3})));});

// Bird markers — placeholder dots replaced by real bird photos as they load
const mG=new THREE.Group(),markers=[],origP=[];
function makeDotTex(color){
  const cv=document.createElement('canvas');cv.width=64;cv.height=64;
  const x=cv.getContext('2d');
  const gr=x.createRadialGradient(32,32,2,32,32,28);
  gr.addColorStop(0,'rgba(255,255,255,0.95)');
  gr.addColorStop(0.4,color+'cc');
  gr.addColorStop(1,color+'00');
  x.fillStyle=gr;x.beginPath();x.arc(32,32,30,0,Math.PI*2);x.fill();
  return new THREE.CanvasTexture(cv);
}
function makeBirdTex(img){
  // Feed the HTMLImageElement directly to Three.js — no intermediate canvas,
  // so there is zero risk of a "tainted canvas" SecurityError in WebGL.
  const tex=new THREE.Texture(img);
  tex.needsUpdate=true;
  return tex;
}
// Stagger image loads to avoid hammering the API (20 at a time, 400ms apart)
B.forEach((b,i)=>{
  // Snap bird to nearest free 10° grid cell so each sits in its own box
  const cell=assignCell(b.la,b.lo);
  const p=ll2v(cell.la,cell.lo,R+.032);
  const spr=new THREE.Sprite(new THREE.SpriteMaterial({map:makeDotTex(b.c),transparent:true,depthTest:true,sizeAttenuation:true}));
  spr.position.copy(p);spr.scale.set(.22,.22,1);spr.userData={bird:b,idx:i,cell};
  mG.add(spr);markers.push(spr);origP.push(p.clone());
});

// Photos are loaded only on demand when the popup opens (see fetchBirdImg in showPopup).
// Background sprite photo loading was removed: 576 parallel API calls caused 429 rate-limit
// errors from iNaturalist; throttled responses omit CORS headers, producing a flood of
// "blocked by CORS policy" errors in the console even though CORS was not the root cause.

// Interaction
const cv2=renderer.domElement;
cv2.addEventListener('pointerdown',e=>{S.mouseDown=true;S.canvasDown=true;S.dragging=false;S.pmx=e.clientX;S.pmy=e.clientY;document.body.classList.add('dragging');});
window.addEventListener('pointermove',e=>{S.mx=(e.clientX/innerWidth)*2-1;S.my=-(e.clientY/innerHeight)*2+1;if(S.mouseDown){const dx=e.clientX-S.pmx,dy=e.clientY-S.pmy;if(Math.abs(dx)+Math.abs(dy)>2)S.dragging=true;S.tRY-=dx*.003;S.tRX+=dy*.003;S.tRX=Math.max(-1.45,Math.min(1.45,S.tRX));S.pmx=e.clientX;S.pmy=e.clientY;}doHover(e);});
window.addEventListener('pointerup',e=>{if(!S.dragging&&S.canvasDown)doClick(e);S.mouseDown=false;S.dragging=false;S.canvasDown=false;document.body.classList.remove('dragging');});
cv2.addEventListener('wheel',e=>{e.preventDefault();S.tDist+=e.deltaY*.006;S.tDist=Math.max(R*1.6,Math.min(R*5,S.tDist));},{passive:false});
let ltd=0;cv2.addEventListener('touchstart',e=>{if(e.touches.length===2)ltd=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);},{passive:true});
cv2.addEventListener('touchmove',e=>{if(e.touches.length===2){const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);S.tDist-=(d-ltd)*.015;S.tDist=Math.max(R*1.6,Math.min(R*5,S.tDist));ltd=d;}},{passive:true});

function doHover(e){_m.set(S.mx,S.my);ray.setFromCamera(_m,camera);const h=ray.intersectObjects(markers);const tip=document.getElementById('tip');if(h.length>0&&h[0].object.visible){const b=h[0].object.userData.bird;tip.style.display='block';tip.style.left=(e.clientX+14)+'px';tip.style.top=(e.clientY-8)+'px';tip.querySelector('.z').textContent=b.z;tip.querySelector('.e').textContent=b.e;cv2.style.cursor='pointer';if(S.hovered&&S.hovered!==h[0].object)S.hovered.scale.set(.22,.22,1);S.hovered=h[0].object;}else{tip.style.display='none';if(!S.mouseDown)cv2.style.cursor='grab';if(S.hovered){S.hovered.scale.set(.22,.22,1);S.hovered=null;}}}
function doClick(e){
  const popup=document.getElementById('popup');
  if(popup.contains(e.target))return; // click inside popup — keep open
  const nx=(e.clientX/innerWidth)*2-1,ny=-(e.clientY/innerHeight)*2+1;
  _m.set(nx,ny);ray.setFromCamera(_m,camera);const h=ray.intersectObjects(markers);
  if(h.length>0&&h[0].object.visible){showPopup(h[0].object.userData.bird);return;}
  // Proximity fallback: find nearest visible marker within ~0.07 NDC (~4% screen) to forgive imprecise clicks
  let best=null,bestD=0.07;
  markers.forEach(m=>{
    if(!m.visible)return;
    const p=m.position.clone().project(camera);
    const d=Math.hypot(p.x-nx,p.y-ny);
    if(d<bestD){bestD=d;best=m;}
  });
  if(best)showPopup(best.userData.bird);
  else{popup.style.display='none';stopSound();S.bird=null;}
}

function makePlaceholder(zh,en,color){const c=document.createElement('canvas');c.width=500;c.height=300;const x=c.getContext('2d');const g=x.createLinearGradient(0,0,500,300);g.addColorStop(0,'#141210');g.addColorStop(1,'#0a0908');x.fillStyle=g;x.fillRect(0,0,500,300);// decorative ring
x.strokeStyle='rgba(200,184,138,0.07)';x.lineWidth=1.5;x.beginPath();x.arc(250,130,80,0,Math.PI*2);x.stroke();x.beginPath();x.arc(250,130,55,0,Math.PI*2);x.stroke();// emoji
x.font='68px serif';x.textAlign='center';x.textBaseline='middle';x.globalAlpha=.25;x.fillText('🐦',250,128);x.globalAlpha=1;// accent dot
x.fillStyle=color||'#c8b88a';x.beginPath();x.arc(250,128,8,0,Math.PI*2);x.fill();// chinese name
x.fillStyle='rgba(232,216,168,0.88)';x.font='bold 21px "Noto Serif SC",serif';x.fillText(zh||'',250,212);// english name
x.fillStyle='rgba(140,120,90,0.65)';x.font='italic 12px "Noto Sans SC",sans-serif';x.fillText(en||'',250,234);// border
x.strokeStyle='rgba(200,184,138,0.07)';x.lineWidth=1;x.strokeRect(12,12,476,276);return c.toDataURL();}

// In-session cache + persistent localStorage cache for photo and audio URLs
// v3: bumped key to clear any stale/corrupted entries from earlier deploys
const _imgCache=new Map();
const _LS_KEY='birdphotos_v3';
const _LS_AUDIO_KEY='birdaudio_v1';
const _lsAudioCache=(()=>{try{return JSON.parse(localStorage.getItem(_LS_AUDIO_KEY)||'{}');}catch{return {};}})();
const _lsCache=(()=>{try{return JSON.parse(localStorage.getItem(_LS_KEY)||'{}');}catch{return {};}})();
function _savePhotoUrl(sci,url){_imgCache.set(sci,url);if(url){_lsCache[sci]=url;try{localStorage.setItem(_LS_KEY,JSON.stringify(_lsCache));}catch{}}}

// Fetch bird photo — tries iNaturalist then Wikipedia, each with its own independent timeout
async function fetchBirdImg(sci,en){
  if(_imgCache.has(sci))return _imgCache.get(sci);
  if(_lsCache[sci]){_imgCache.set(sci,_lsCache[sci]);return _lsCache[sci];}
  const s=()=>AbortSignal.timeout?AbortSignal.timeout(8000):undefined;
  // 1. iNaturalist — has photos for all bird species
  try{
    const r=await fetch(`https://api.inaturalist.org/v1/taxa?q=${encodeURIComponent(sci)}&per_page=1&rank=species`,{signal:s()});
    if(r.ok){const d=await r.json();const p=d.results?.[0]?.default_photo;const url=p&&(p.medium_url||p.url||(p.square_url?p.square_url.replace('/square.','/medium.'):null));if(url){_savePhotoUrl(sci,url);return url;}}
  }catch{}
  // 2. Wikipedia by scientific name
  try{
    const r=await fetch(`https://en.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(sci)}&prop=pageimages&pithumbsize=600&format=json&origin=*`,{signal:s()});
    if(r.ok){const d=await r.json();const src=Object.values(d.query.pages)[0]?.thumbnail?.source;if(src){_savePhotoUrl(sci,src);return src;}}
  }catch{}
  // 3. Wikipedia by English name
  try{
    const r=await fetch(`https://en.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(en)}&prop=pageimages&pithumbsize=600&format=json&origin=*`,{signal:s()});
    if(r.ok){const d=await r.json();const src=Object.values(d.query.pages)[0]?.thumbnail?.source;if(src){_savePhotoUrl(sci,src);return src;}}
  }catch{}
  return null;
}

// Popup
async function showPopup(bird){S.bird=bird;const popup=document.getElementById('popup'),img=document.getElementById('pop-img'),spin=document.getElementById('img-spin');
// Set text
document.getElementById('pop-zh').textContent=bird.z;document.getElementById('pop-en').textContent=bird.e;document.getElementById('pop-desc').textContent=bird.d;document.getElementById('pop-sci').textContent=bird.s;
// Show placeholder immediately — no black box
img.src=makePlaceholder(bird.z,bird.e,bird.c);img.style.display='block';spin.style.display='block';popup.style.display='block';
// Async load real photo — evict cache on 404 so next click retries
fetchBirdImg(bird.s,bird.e).then(url=>{
  if(!url||S.bird!==bird){spin.style.display='none';return;}
  img.onerror=()=>{img.onerror=null;img.src=makePlaceholder(bird.z,bird.e,bird.c);_imgCache.delete(bird.s);delete _lsCache[bird.s];try{localStorage.setItem(_LS_KEY,JSON.stringify(_lsCache));}catch{}spin.style.display='none';};
  img.src=url;img.style.display='block';spin.style.display='none';
}).catch(()=>{spin.style.display='none';});
if(!S.muted)playSound(bird);}
document.getElementById('pop-close').onclick=()=>{document.getElementById('popup').style.display='none';stopSound();S.bird=null;};
document.getElementById('pop-play').onclick=()=>{if(S.bird)playSound(S.bird);};
document.getElementById('pop-wiki').onclick=()=>{if(S.bird)window.open(`https://en.wikipedia.org/wiki/${encodeURIComponent(S.bird.s)}`,'_blank');};
async function playSound(bird){
  stopSound();
  const btn=document.getElementById('pop-play');
  btn.classList.add('playing');
  btn.innerHTML='<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> 播放中...';
  const resetBtn=(label='聆听鸟鸣')=>{btn.classList.remove('playing');btn.innerHTML=`<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21"/></svg> ${label}`;};

  // From file:// the xeno-canto API fetch is blocked by CORS — show message only, never open new tab
  const isFileOrigin=location.protocol==='file:';
  if(isFileOrigin){
    resetBtn('请用服务器打开');
    btn.title='请通过 http://localhost:8765 访问此文件以启用鸟鸣播放功能';
    return;
  }

  // Check audio cache — skip API lookup if already found
  if(_lsAudioCache[bird.s]){
    const a=new Audio();a.volume=.55;a.src=_lsAudioCache[bird.s];S.audio=a;
    const ind=document.getElementById('audio-ind');document.getElementById('aud-name').textContent=bird.z;ind.style.display='flex';
    a.play().catch(()=>resetBtn('播放失败'));a.onerror=()=>{resetBtn('暂无录音');ind.style.display='none';};a.onended=()=>{ind.style.display='none';resetBtn();};
    return;
  }

  try{
    // All audio sources run in parallel — first winner is used
    const mkSig2=()=>AbortSignal.timeout?AbortSignal.timeout(6000):undefined;

    // Source 1: xeno-canto (Accept:application/json fixes servers that return HTML 404 without it)
    const xcAudio=async()=>{
      for(const q of [bird.s.replace(/ /g,'+'),bird.e.replace(/ /g,'+')]){
        try{
          const r=await fetch(`https://xeno-canto.org/api/2/recordings?query=${q}`,
            {mode:'cors',credentials:'omit',headers:{'Accept':'application/json'},signal:mkSig2()});
          if(!r.ok)continue;
          const d=await r.json();
          if(d.recordings?.length){
            let f=d.recordings[0].file||'';
            if(f.startsWith('//'))f='https:'+f;
            else if(f.startsWith('/'))f='https://xeno-canto.org'+f;
            else if(!f.startsWith('http'))f=`https://xeno-canto.org/${d.recordings[0].id}/download`;
            if(f)return f;
          }
        }catch{}
      }
      throw 0;
    };

    // Source 2 & 3: Wikimedia Commons by sci name and English name (run in parallel)
    const wikiAudio=async(q)=>{
      const r=await fetch(`https://commons.wikimedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(q)}&srnamespace=6&srlimit=5&format=json&origin=*`,{signal:mkSig2()});
      if(!r.ok)throw 0;
      const af=((await r.json()).query?.search||[]).filter(f=>/\.(ogg|mp3|flac)$/i.test(f.title));
      if(!af.length)throw 0;
      const r2=await fetch(`https://commons.wikimedia.org/w/api.php?action=query&titles=${encodeURIComponent(af[0].title)}&prop=imageinfo&iiprop=url&format=json&origin=*`,{signal:mkSig2()});
      if(!r2.ok)throw 0;
      const url=Object.values((await r2.json()).query.pages)[0]?.imageinfo?.[0]?.url;
      if(!url)throw 0;
      return url;
    };

    const audioUrl=await Promise.any([xcAudio(),wikiAudio(bird.s),wikiAudio(bird.e)]).catch(()=>null);

    if(!audioUrl){resetBtn('暂无录音');return;}

    // Save to localStorage so next click plays instantly
    _lsAudioCache[bird.s]=audioUrl;
    try{localStorage.setItem(_LS_AUDIO_KEY,JSON.stringify(_lsAudioCache));}catch{}

    const a=new Audio();
    // Do NOT set crossOrigin — Xeno-canto CDN audio files don't send CORS headers
    a.volume=.55;
    a.src=audioUrl;
    S.audio=a;
    const ind=document.getElementById('audio-ind');
    document.getElementById('aud-name').textContent=bird.z;
    ind.style.display='flex';
    a.play().catch(err=>{console.warn('Audio play failed:',err.message);resetBtn('播放失败');ind.style.display='none';});
    a.onerror=()=>{resetBtn('暂无录音');ind.style.display='none';};
    a.onended=()=>{ind.style.display='none';resetBtn()};
  }catch(err){
    console.log('Audio error:',err);
    resetBtn('加载失败');
  }
}
function stopSound(){if(S.audio){S.audio.pause();S.audio.currentTime=0;S.audio=null;}document.getElementById('audio-ind').style.display='none';const btn=document.getElementById('pop-play');btn.classList.remove('playing');btn.innerHTML='<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21"/></svg> 聆听鸟鸣';}

// Region buttons
const rgnDiv=document.getElementById('rgn');
Object.entries(REGIONS).forEach(([k,v])=>{const btn=document.createElement('button');btn.textContent=v.label;btn.dataset.r=k;if(k==='global')btn.classList.add('on');btn.onclick=()=>{rgnDiv.querySelectorAll('button').forEach(b=>b.classList.remove('on'));btn.classList.add('on');const rr=REGIONS[k],phi=(90-rr.lat)*Math.PI/180;S.tRX=Math.PI/2-phi;S.tRY=(rr.lng+90)*Math.PI/180;S.tDist=R*rr.alt;if(k==='global')markers.forEach(m=>{m.visible=true;});else{const bd=RBOUNDS[k];markers.forEach((m,i)=>{const b=B[i];m.visible=b.la>=bd.la&&b.la<=bd.La&&b.lo>=bd.lo&&b.lo<=bd.Lo;});}S.region=k;};rgnDiv.appendChild(btn);});

// Function buttons
document.getElementById('ck-grid').onchange=e=>{gridG.visible=e.target.checked;};
document.getElementById('ck-routes').onchange=e=>{arcG.visible=e.target.checked;};
// Story mode: auto-tour through birds one by one with popup
let storyTimer=null,storyIdx=0;
document.getElementById('ck-story').onchange=function(){
  if(this.checked){
    S.autoRotate=false;
    document.getElementById('b-rotate').classList.remove('on');
    storyIdx=0;
    function storyStep(){
      const b=B[storyIdx%B.length];
      // Fly camera to bird location
      const phi=(90-b.la)*Math.PI/180;
      S.tRX=Math.PI/2-phi;S.tRY=(b.lo+90)*Math.PI/180;S.tDist=R*1.6;
      showPopup(b);
      storyIdx++;
      storyTimer=setTimeout(storyStep,5000);
    }
    storyStep();
  }else{
    clearTimeout(storyTimer);storyTimer=null;
    document.getElementById('popup').style.display='none';
    stopSound();S.bird=null;
  }
};
document.getElementById('b-scatter').onclick=function(){S.scattered=!S.scattered;this.classList.toggle('on',S.scattered);markers.forEach((m,i)=>{if(S.scattered){const dir=origP[i].clone().normalize();const d=4+Math.random()*10;const off=new THREE.Vector3((Math.random()-.5)*5,(Math.random()-.5)*5,(Math.random()-.5)*5);m.userData.tgt=dir.multiplyScalar(d).add(off);m.userData.spd=.012+Math.random()*.025;}else{m.userData.tgt=origP[i].clone();m.userData.spd=.025+Math.random()*.02;}});};
document.getElementById('b-migrate').onclick=function(){S.migrating=!S.migrating;this.classList.toggle('on',S.migrating);};
document.getElementById('b-mute').onclick=function(){S.muted=!S.muted;this.classList.toggle('on',S.muted);if(S.muted)stopSound();};
document.getElementById('b-rotate').onclick=function(){S.autoRotate=!S.autoRotate;this.classList.toggle('on',S.autoRotate);};

// Resize
window.addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});

// Animate
function animate(){requestAnimationFrame(animate);const t=clock.getElapsedTime();
if(S.autoRotate&&!S.mouseDown)S.tRY-=.0005;
S.rY+=(S.tRY-S.rY)*.055;S.rX+=(S.tRX-S.rX)*.055;S.dist+=(S.tDist-S.dist)*.055;
camera.position.x=S.dist*Math.cos(S.rX)*Math.sin(S.rY);camera.position.y=S.dist*Math.sin(S.rX);camera.position.z=S.dist*Math.cos(S.rX)*Math.cos(S.rY);camera.lookAt(0,0,0);
const sa=t*.015;sun.position.set(-25*Math.cos(sa),8+3*Math.sin(sa*.3),18*Math.sin(sa));
if(earth.material.uniforms)earth.material.uniforms.uSun.value.copy(sun.position).normalize();
if(cloudMesh)cloudMesh.rotation.y+=.00006;
markers.forEach(m=>{if(m.userData.tgt){m.position.lerp(m.userData.tgt,m.userData.spd);if(m.position.distanceTo(m.userData.tgt)<.005)m.userData.tgt=null;}});
if(S.hovered){const s=.30+.04*Math.sin(t*5);S.hovered.scale.set(s,s,1);}
if(S.migrating)arcG.children.forEach((a,i)=>{a.material.opacity=.15+.35*Math.abs(Math.sin(t*.7+i*.4));});
renderer.render(scene,camera);}

document.getElementById('lbar').style.width='100%';
// Show file:// warning banner if not served over http
if(location.protocol==='file:')document.getElementById('file-warn').style.display='block';
setTimeout(()=>{const ld=document.getElementById('loading');ld.classList.add('done');setTimeout(()=>{ld.style.display='none';},1100);},600);

// ── Progressive bird cutout loader ───────────────────────────────────────────
// Renders actual bird photos as transparent cutouts directly on the globe —
// no circular borders, birds appear standing on the globe surface.
//
// Technique: canvas edge-sampling + color-distance threshold removes the
// background (sky, water, foliage), then a soft radial vignette feathers the
// oval boundary. The result is used as a Three.js Sprite with alphaTest so
// transparent pixels are fully discarded by the renderer.
//
// Performance: cached URLs fire image loads immediately (no API call, parallel);
// uncached birds throttle to ≤1 API call / 150ms to avoid iNaturalist 429s.
// First visit: birds appear progressively over ~90s. Repeat visits: ~5s from cache.
(function bgPhotoLoad(){
  if(location.protocol==='file:')return; // file:// blocks crossOrigin canvas draw

  // Build transparent cutout texture from a loaded <img> element.
  // Returns {canvas, aspect} or throws on security/CORS error.
  function makeCutoutTex(imgEl){
    const W=256, H=Math.max(64,Math.round(256*imgEl.naturalHeight/imgEl.naturalWidth));
    const cv=document.createElement('canvas'); cv.width=W; cv.height=H;
    const ctx=cv.getContext('2d');
    ctx.drawImage(imgEl,0,0,W,H);

    // ── Step 1: sample ALL edge pixels, take median as background colour ──
    const id=ctx.getImageData(0,0,W,H); const px=id.data;
    const samp=[];
    const addS=(x,y)=>{const i=(y*W+x)*4;samp.push([px[i],px[i+1],px[i+2]]);};
    for(let x=0;x<W;x+=2){addS(x,0);addS(x,H-1);}
    for(let y=0;y<H;y+=2){addS(0,y);addS(W-1,y);}
    const med=(ch)=>samp.map(s=>s[ch]).sort((a,b)=>a-b)[samp.length>>1];
    const bg=[med(0),med(1),med(2)];

    // ── Step 2: per-pixel colour-distance threshold removal ───────────────
    const T=55; // distance threshold (0–441); raise for more aggressive removal
    for(let i=0,j=0;i<W*H;i++,j+=4){
      const d=Math.sqrt((px[j]-bg[0])**2+(px[j+1]-bg[1])**2+(px[j+2]-bg[2])**2);
      if(d<T) px[j+3]=Math.round((d/T)**1.5*255); // soft fade near threshold
    }
    ctx.putImageData(id,0,0);

    // ── Step 3: feathered oval vignette (destination-in) to clean edges ───
    ctx.globalCompositeOperation='destination-in';
    const g=ctx.createRadialGradient(W/2,H/2,W*0.22,W/2,H/2,W*0.53);
    g.addColorStop(0,'rgba(255,255,255,1)');
    g.addColorStop(0.72,'rgba(255,255,255,0.97)');
    g.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
    ctx.globalCompositeOperation='source-over';

    return {canvas:cv, aspect:W/H};
  }

  // Apply transparent cutout to sprite; fall back silently on CORS / load failure.
  function applyPhoto(spr,b,url){
    if(!url)return;
    const img=new Image(); img.crossOrigin='anonymous';
    img.onload=()=>{
      try{
        const{canvas,aspect}=makeCutoutTex(img);
        const tex=new THREE.CanvasTexture(canvas);
        const mat=new THREE.SpriteMaterial({
          map:tex, transparent:true, alphaTest:0.15,
          depthTest:true, sizeAttenuation:true
        });
        if(spr.material.map) spr.material.map.dispose();
        spr.material.dispose();
        spr.material=mat;
        // Scale to natural aspect ratio so tall/wide birds look correct
        const h=0.32; spr.scale.set(h*aspect,h,1);
      }catch(e){} // SecurityError from tainted canvas → keep colored dot
    };
    img.onerror=()=>{}; // network failure → keep colored dot
    img.src=url;
  }

  // Queue: cached-URL birds first (instant, no API call);
  // among uncached: prefer birds currently facing the camera.
  const q=markers.map((spr,i)=>({spr,b:B[i],url:_lsCache[B[i].s]||null}));
  q.sort((a,b)=>{
    if(!!a.url!==!!b.url)return a.url?-1:1;
    return b.spr.position.dot(camera.position)-a.spr.position.dot(camera.position);
  });

  let qi=0;
  function run(){
    if(qi>=q.length)return;
    const item=q[qi++];
    if(item.url){
      applyPhoto(item.spr,item.b,item.url);
      setTimeout(run,8);   // fire image loads quickly — they complete asynchronously
    }else{
      fetchBirdImg(item.b.s,item.b.e).then(url=>applyPhoto(item.spr,item.b,url)).catch(()=>{});
      setTimeout(run,150); // throttle API calls to avoid iNaturalist rate-limit
    }
  }
  setTimeout(run,1500); // start after globe renders
})();
animate();
